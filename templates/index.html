{% extends "layout.html" %} {% block content %}
<div class="flex justify-center">
  <div
    class="flex flex-col items-center justify-center gap-6 p-12 max-w-2xl w-full"
  >
    <p class="text-4xl font-bold">CIFAR-10 画像判定AI</p>
    <p class="text-xl">画像判定AIがどんな画像か当ててくれるアプリ</p>

    <div class="card card-border bg-base-200 shadow-sg p-4">
      <div class="card-title">アプリの説明</div>
      <div class="card-body">
        <p class="text-base">
          画像を選択すると画像判定AIがどんな画像か当ててくれるアプリです。<br />
          CIFAR-10という60,000枚の画像を使って学習したモデルを使用しています。<br />
          本アプリでは、以下の10種類の乗り物・動物から最も似ているものを判定します。<br />
        </p>
        <div class="carousel rounded-box">
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/airplane.jpg') }}"
              alt="airplane"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/automobile.jpg') }}"
              alt="automobile"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/bird.jpg') }}"
              alt="bird"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/cat.jpg') }}"
              alt="cat"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/deer.jpg') }}"
              alt="deer"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/dog.jpg') }}"
              alt="dog"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/frog.jpg') }}"
              alt="frog"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/horse.jpg') }}"
              alt="horse"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/ship.jpg') }}"
              alt="ship"
              class="h-48 object-cover"
            />
          </div>
          <div class="carousel-item">
            <img
              src="{{ url_for('static', filename='images/truck.jpg') }}"
              alt="truck"
              class="h-48 object-cover"
            />
          </div>
        </div>
      </div>
    </div>
    <a href="{{ url_for('select') }}" class="btn btn-neutral">スタート</a>
  </div>
</div>
{% endblock %}
